name: Deploy Senku Bot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check syntax
      run: node -c index.js
    
    - name: Verify file structure
      run: |
        test -f index.js && echo "✓ index.js exists"
        test -f package.json && echo "✓ package.json exists"
        test -d lib && echo "✓ lib/ directory exists"
        test -d plugins && echo "✓ plugins/ directory exists"
    
    - name: Success notification
      if: success()
      run: echo "✅ Bot deployment check passed!"
